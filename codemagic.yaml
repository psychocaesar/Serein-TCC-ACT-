workflows:
  ios-release:
    name: Serein TCC-ACT iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Serein ASC

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: fr.sereinapp.tccact
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Build web (www) + Capacitor sync iOS
        script: |
          npm run build:web
          npx cap sync ios

      - name: Apply code signing to Xcode project
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - builds@sereinapp.fr
