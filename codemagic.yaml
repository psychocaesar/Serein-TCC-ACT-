workflows:
  ios-release:
    name: Serein TCC-ACT iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Serein ASC

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: fr.sereinapp.tccact
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        # Apple ID numérique de Serein TCC·ACT (App Store Connect → Infos générales → « Apple ID »)
        APP_APPLE_ID: "6781663800"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Build web (www) + Capacitor sync iOS
        script: |
          npm run build:web
          npx cap sync ios

      - name: Auto-incrémente le build number (dernier TestFlight + 1)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_APPLE_ID")
          if [ -z "$LATEST" ]; then
            echo "⚠️  Build number introuvable — vérifie APP_APPLE_ID et l'intégration App Store Connect."
            exit 1
          fi
          NEW=$((LATEST + 1))
          echo "Dernier build TestFlight : $LATEST → nouveau : $NEW"
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$NEW"

      - name: Apply code signing to Xcode project
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - builds@sereinapp.fr
