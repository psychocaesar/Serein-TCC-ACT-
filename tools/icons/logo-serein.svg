<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#132e26"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#2f6f5e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2f6f5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7ee8be"/>
      <stop offset="50%" stop-color="#4db896"/>
      <stop offset="100%" stop-color="#2a8a68"/>
    </linearGradient>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="halo-blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Halo de profondeur -->
  <ellipse cx="256" cy="210" rx="180" ry="160" fill="url(#halo)" filter="url(#halo-blur)"/>

  <!-- S principal — trait épais avec dégradé -->
  <path
    d="M 308 158
       C 308 158 242 142 210 178
       C 178 214 206 240 244 252
       C 282 264 312 284 306 322
       C 300 358 228 370 196 362"
    fill="none"
    stroke="url(#stroke-grad)"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow-soft)"
  />

  <!-- S — filet lumineux par-dessus -->
  <path
    d="M 308 158
       C 308 158 242 142 210 178
       C 178 214 206 240 244 252
       C 282 264 312 284 306 322
       C 300 358 228 370 196 362"
    fill="none"
    stroke="#d4f5e2"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- Petits points aux extrémités -->
  <circle cx="308" cy="158" r="7" fill="#7ee8be" opacity="0.7"/>
  <circle cx="196" cy="362" r="7" fill="#4db896" opacity="0.5"/>


</svg>
